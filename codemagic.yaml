# Codemagic CI — build + sign the Capacitor iOS app on a cloud Mac (you're on
# Windows, so this is how iOS gets built). Set up once in the Codemagic UI:
#   1. Connect this GitHub repo.
#   2. Apps → Settings → Code signing identities → connect your App Store Connect
#      API key (Apple Developer → Users and Access → Integrations → App Store Connect
#      API → generate a key). Name the integration "codemagic" (or update below).
#   3. Make sure the App (bundle id com.creativedirector.app — change it to one you
#      own) exists in App Store Connect first.
# Then push to main and Codemagic runs this workflow.

workflows:
  ios-app:
    name: Creative Director iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: codemagic # <- the integration name you set in the UI
    environment:
      # No ios_signing block: Codemagic's automatic signing only FETCHES profiles, it
      # doesn't create them, so it fails "no matching profiles" on a fresh account.
      # We create everything explicitly in the scripts with fetch-signing-files
      # --create (the canonical recipe) using a PERSISTENT certificate key stored as
      # the CERTIFICATE_PRIVATE_KEY secure variable (group "signing") — so the same
      # certificate is REUSED across builds instead of revoke+recreate every run
      # (which spammed "Your Certificate Has Been Revoked" emails on every build).
      groups:
        - signing # holds CERTIFICATE_PRIVATE_KEY (secure) — set in the Codemagic UI
      vars:
        BUNDLE_ID: "com.creativedirector.app"
        APP_NAME: "Creative Director"
      node: 22 # Capacitor 8 CLI requires Node >= 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install web dependencies
        script: |
          cd frontend
          npm ci
      - name: Build the web bundle (native mode → Railway API)
        script: |
          cd frontend
          npm run build:app
      - name: Generate + sync the iOS project
        script: |
          cd frontend
          npx cap add ios || true   # generated fresh in CI (ios/ isn't committed)
          npx cap sync ios
      - name: Generate app icons + splash
        # App Store REJECTS binaries with no app icon. Generate the iOS icon set +
        # splash from frontend/resources/{icon.png,splash.png}.
        script: |
          cd frontend
          npx @capacitor/assets@latest generate --ios
      - name: Inject required Info.plist usage strings
        # The photo-library string is REQUIRED — iOS kills the app on photo access
        # without it, and App Review rejects apps that access without a reason.
        script: |
          PLIST="frontend/ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Creative Director needs access to your videos so you can pick a reel to get a craft read.'" "$PLIST" || \
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 'Creative Director needs access to your videos so you can pick a reel to get a craft read.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Creative Director can record a reel to analyze.'" "$PLIST" || \
          /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'Creative Director can record a reel to analyze.'" "$PLIST"
          # Recording VIDEO uses the microphone — without this string iOS terminates
          # the capture UI, which was tester round-1's "camera doesn't work".
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'The microphone records your reel’s audio when you capture video in the app.'" "$PLIST" || \
          /usr/libexec/PlistBuddy -c "Set :NSMicrophoneUsageDescription 'The microphone records your reel’s audio when you capture video in the app.'" "$PLIST"
          # Export compliance: no non-exempt encryption — avoids the TestFlight
          # "Missing Compliance" block + a manual prompt on every upload.
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"
          # Unique, increasing build number. TestFlight REJECTS a re-upload that
          # reuses a previous CFBundleVersion ("bundle version must be higher").
          # Capacitor defaults every fresh `cap add ios` to 1, so without this every
          # build would collide with the first. BUILD_NUMBER auto-increments per CI run.
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${BUILD_NUMBER}" "$PLIST" || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string ${BUILD_NUMBER}" "$PLIST"
          # Marketing version — MUST be bumped for each App Store update (you can't
          # resubmit a version string that's already live; 1.0 shipped 2026-07-01,
          # 1.0.1 on 2026-07-02).
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.2.0" "$PLIST" || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string 1.2.0" "$PLIST"
          echo "Version 1.2.0 build ${BUILD_NUMBER}"
      - name: Enable Sign in with Apple (entitlement + project wiring)
        # ios/ is regenerated every build, so the entitlement must be (re)created
        # in CI each run. The provisioning profile fetched below (--create) includes
        # this entitlement automatically BECAUSE the com.creativedirector.app App ID
        # has the "Sign In with Apple" capability enabled in the Apple portal. If you
        # ever see a "doesn't match the entitlements" signing error, that portal
        # capability is the thing to check first.
        script: |
          set -e
          ENT="frontend/ios/App/App/App.entitlements"
          rm -f "$ENT"
          /usr/libexec/PlistBuddy -c "Add :com.apple.developer.applesignin array" "$ENT"
          /usr/libexec/PlistBuddy -c "Add :com.apple.developer.applesignin:0 string Default" "$ENT"
          echo "--- App.entitlements ---"; /usr/libexec/PlistBuddy -c "Print" "$ENT"
          gem install xcodeproj --no-document
          ruby frontend/ci/set_entitlements.rb
      - name: Install CocoaPods (only if the project uses Pods)
        # Capacitor 8 uses Swift Package Manager — no Podfile. Skip pod install when
        # there isn't one (xcodebuild resolves SPM deps during the build).
        script: |
          cd frontend/ios/App
          if [ -f Podfile ]; then
            pod install
          else
            echo "No Podfile — Capacitor uses Swift Package Manager, skipping pod install."
          fi
      - name: Set up code signing (persistent certificate, reused across builds)
        # CERTIFICATE_PRIVATE_KEY is a secure env var (group "signing") holding a
        # PEM RSA key generated once and kept forever. fetch-signing-files matches
        # the existing distribution cert to this key and REUSES it; --create only
        # makes one on the very first run (or if none matches). No delete/revoke —
        # which is what used to fire an Apple "certificate revoked" email per build.
        script: |
          set -e
          if [ -z "${CERTIFICATE_PRIVATE_KEY:-}" ]; then
            echo "ERROR: CERTIFICATE_PRIVATE_KEY is not set."
            echo "Codemagic UI -> app -> Environment variables -> add CERTIFICATE_PRIVATE_KEY"
            echo "(paste the PEM from ios_dist_certificate_key.pem, group 'signing', check Secure)."
            exit 1
          fi
          keychain initialize
          # --delete-stale-profiles: profiles invalidated by capability changes (e.g.
          # enabling Sign In with Apple) or by the historical cert churn get cleaned
          # up so --create regenerates a valid one that includes the entitlements.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create \
            --delete-stale-profiles
          keychain add-certificates
          xcode-project use-profiles
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" || true
      - name: Build the IPA
        # CocoaPods produces an .xcworkspace; an SPM-only Capacitor project has just
        # the .xcodeproj. Use whichever exists.
        script: |
          cd frontend/ios/App
          if [ -d "App.xcworkspace" ]; then
            xcode-project build-ipa --workspace "App.xcworkspace" --scheme App
          else
            xcode-project build-ipa --project "App.xcodeproj" --scheme App
          fi
    artifacts:
      - frontend/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true   # lands in TestFlight; flip on submit_to_app_store when ready
